<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Job - SiraLink Admin</title>

<link rel="stylesheet" href="../../assets/css/admin.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
}

.header{
background:#0A3D91;
color:white;
padding:20px;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h2{
margin-bottom:20px;
color:#0A3D91;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#333;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:14px;
}

textarea{
resize:vertical;
min-height:140px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.btn{
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
font-size:15px;
}

.primary{
background:#0A3D91;
color:white;
}

.secondary{
background:#e9eefb;
color:#0A3D91;
}

.actions{
display:flex;
gap:10px;
margin-top:20px;
}

.success{
display:none;
background:#d4edda;
color:#155724;
padding:12px;
border-radius:10px;
margin-bottom:15px;
}

@media(max-width:768px){

.row{
grid-template-columns:1fr;
}

.actions{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="header">
<h1>Add New Job</h1>
</div>

<div class="container">

<div class="card">

<div class="success" id="successBox">
Job created successfully.
</div>

<h2>Create Job Vacancy</h2>

<form id="jobForm">

<div class="form-group">
<label>Job Title</label>
<input
type="text"
id="title"
required>
</div>

<div class="row">

<div class="form-group">
<label>Department</label>

<select id="department" required>
<option value="">Select Department</option>
<option>IT</option>
<option>Finance</option>
<option>Marketing</option>
<option>Engineering</option>
<option>HR</option>
<option>Management</option>
</select>

</div>

<div class="form-group">
<label>Location</label>

<input
type="text"
id="location"
placeholder="Addis Ababa"
required>

</div>

</div>

<div class="row">

<div class="form-group">
<label>Employment Type</label>

<select id="type" required>
<option value="">Select Type</option>
<option>Full Time</option>
<option>Part Time</option>
<option>Contract</option>
<option>Internship</option>
<option>Remote</option>
</select>

</div>

<div class="form-group">
<label>Experience Required</label>

<input
type="number"
id="experience"
min="0"
placeholder="Years"
required>

</div>

</div>

<div class="row">

<div class="form-group">
<label>Salary</label>

<input
type="text"
id="salary"
placeholder="20,000 ETB">

</div>

<div class="form-group">
<label>Application Deadline</label>

<input
type="date"
id="deadline"
required>

</div>

</div>

<div class="form-group">

<label>Requirements</label>

<textarea
id="requirements"
placeholder="Required skills and qualifications..."
required></textarea>

</div>

<div class="form-group">

<label>Job Description</label>

<textarea
id="description"
placeholder="Detailed job description..."
required></textarea>

</div>

<div class="actions">

<button
type="submit"
class="btn primary">
Publish Job
</button>

<button
type="reset"
class="btn secondary">
Reset Form
</button>

</div>

</form>

</div>

</div>

<script>

const form =
document.getElementById("jobForm");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const jobData = {

title:
document.getElementById("title").value,

department:
document.getElementById("department").value,

location:
document.getElementById("location").value,

employment_type:
document.getElementById("type").value,

experience_required:
document.getElementById("experience").value,

salary:
document.getElementById("salary").value,

deadline:
document.getElementById("deadline").value,

requirements:
document.getElementById("requirements").value,

description:
document.getElementById("description").value

};

console.log(jobData);

/*
Supabase Insert Example

const { data, error } =
await supabase
.from('jobs')
.insert([jobData]);

*/

document
.getElementById("successBox")
.style.display = "block";

form.reset();

window.scrollTo({
top:0,
behavior:"smooth"
});

});

</script>

</body>
</html>
